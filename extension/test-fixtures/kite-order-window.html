<!doctype html>
<html lang="en">
  <!--
    Static fixture replicating the STRUCTURE of Zerodha Kite's web order window
    (kite.zerodha.com) for extension e2e tests — real Kite sits behind a login,
    so the capture adapter is exercised against this stand-in instead.

    Mirrored idioms (cf. extension/src/brokers/kite.ts, adapter v1):
      - marketwatch rows: .instruments .instrument > span.nickname + span.exchange-tag
      - dialog: .order-window with a `buy`/`sell` class for the transaction type
      - header: .instrument-name > .name + .exchange, .last-price
      - fields: input[name=quantity], input[name=price], input[name=trigger_price]
      - footer: button.submit[type=submit] ("Buy"/"Sell") + button.cancel

    The window is injected DYNAMICALLY on the B/S row actions, mimicking Kite's
    SPA behaviour so the content script's MutationObserver path is what's tested.
    Visuals are approximate on purpose; structure is what the adapter reads.
  -->
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kite fixture — order window</title>
    <style>
      body {
        margin: 0;
        font:
          14px/1.4 system-ui,
          sans-serif;
        background: #f9f9f9;
        color: #444;
      }
      .marketwatch {
        width: 430px;
        border-right: 1px solid #eee;
        background: #fff;
        min-height: 100vh;
      }
      .instrument {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid #f2f2f2;
      }
      .nickname {
        font-weight: 500;
      }
      .exchange-tag {
        font-size: 10px;
        color: #9b9b9b;
      }
      .last-price {
        margin-left: auto;
      }
      .action-buttons button {
        font: inherit;
        font-size: 12px;
        width: 28px;
        height: 24px;
        border: 1px solid #ddd;
        border-radius: 3px;
        background: #fff;
        cursor: pointer;
      }
      .action-buttons .buy {
        color: #4184f3;
      }
      .action-buttons .sell {
        color: #ff5722;
      }
      .order-window {
        position: fixed;
        left: 120px;
        top: 90px;
        width: 480px;
        background: #fff;
        border-radius: 4px;
        box-shadow: 0 3px 12px rgb(0 0 0 / 0.22);
      }
      .order-window .window-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 15px;
        color: #fff;
        border-radius: 4px 4px 0 0;
      }
      .order-window.buy .window-header {
        background: #4184f3;
      }
      .order-window.sell .window-header {
        background: #ff5722;
      }
      .instrument-name .name {
        font-weight: 600;
      }
      .instrument-name .exchange {
        font-size: 11px;
        opacity: 0.85;
        margin-left: 4px;
      }
      .window-header .last-price {
        font-size: 12px;
      }
      .window-body {
        display: flex;
        gap: 10px;
        padding: 16px 15px;
      }
      .su-input-group {
        flex: 1;
      }
      .su-input-group label {
        display: block;
        font-size: 11px;
        color: #9b9b9b;
        margin-bottom: 4px;
      }
      .su-input-group input {
        width: 100%;
        box-sizing: border-box;
        font: inherit;
        padding: 6px 8px;
        border: 1px solid #ddd;
        border-radius: 3px;
      }
      .su-input-group input:disabled {
        background: #f5f5f5;
        color: #aaa;
      }
      .window-footer {
        display: flex;
        align-items: center;
        padding: 12px 15px;
        border-top: 1px solid #eee;
      }
      .margin-info {
        font-size: 12px;
        color: #9b9b9b;
      }
      .window-footer .actions {
        margin-left: auto;
        display: flex;
        gap: 8px;
      }
      .window-footer button {
        font: inherit;
        padding: 8px 22px;
        border: none;
        border-radius: 3px;
        cursor: pointer;
      }
      .order-window.buy button.submit {
        background: #4184f3;
        color: #fff;
      }
      .order-window.sell button.submit {
        background: #ff5722;
        color: #fff;
      }
      button.cancel {
        background: #f5f5f5;
      }
    </style>
  </head>
  <body>
    <div class="marketwatch">
      <div class="instruments">
        <div class="instrument" data-fixture-row="INFY">
          <span class="nickname">INFY</span>
          <span class="exchange-tag">NSE</span>
          <span class="last-price">1,519.95</span>
          <span class="action-buttons">
            <button type="button" class="buy" data-fixture="buy" aria-label="Buy INFY">B</button>
            <button type="button" class="sell" data-fixture="sell" aria-label="Sell INFY">S</button>
          </span>
        </div>
        <div class="instrument" data-fixture-row="NIFTY2661924500CE">
          <span class="nickname">NIFTY2661924500CE</span>
          <span class="exchange-tag">NFO</span>
          <span class="last-price">145.30</span>
          <span class="action-buttons">
            <button type="button" class="buy" data-fixture="buy" aria-label="Buy NIFTY option">
              B
            </button>
            <button type="button" class="sell" data-fixture="sell" aria-label="Sell NIFTY option">
              S
            </button>
          </span>
        </div>
        <!-- MCX commodity future — exercises the COMM segment + MCX exchange. -->
        <div class="instrument" data-fixture-row="CRUDEOIL24JUNFUT">
          <span class="nickname">CRUDEOIL24JUNFUT</span>
          <span class="exchange-tag">MCX</span>
          <span class="last-price">6,540.00</span>
          <span class="action-buttons">
            <button type="button" class="buy" data-fixture="buy" aria-label="Buy crude oil">B</button>
            <button type="button" class="sell" data-fixture="sell" aria-label="Sell crude oil">
              S
            </button>
          </span>
        </div>
        <!-- CDS currency future — exercises the CDS segment + CDS exchange. -->
        <div class="instrument" data-fixture-row="USDINR24JUNFUT">
          <span class="nickname">USDINR24JUNFUT</span>
          <span class="exchange-tag">CDS</span>
          <span class="last-price">83.4525</span>
          <span class="action-buttons">
            <button type="button" class="buy" data-fixture="buy" aria-label="Buy USDINR">B</button>
            <button type="button" class="sell" data-fixture="sell" aria-label="Sell USDINR">S</button>
          </span>
        </div>
      </div>
    </div>

    <script>
      // Kite injects its order dialog on demand — the fixture does the same.
      function openOrderWindow(row, side) {
        document.querySelector(".order-window")?.remove();
        const name = row.querySelector(".nickname").textContent;
        const exchange = row.querySelector(".exchange-tag").textContent;
        const lastPrice = row.querySelector(".last-price").textContent;
        // The option row mimics a MARKET order: price input disabled at 0,
        // exercising the adapter's last-price fallback.
        const market = exchange === "NFO";

        const win = document.createElement("form");
        win.className = "order-window " + side;
        win.innerHTML = `
          <div class="window-header">
            <span class="instrument-name">
              <span class="name">${name}</span>
              <span class="exchange">${exchange}</span>
            </span>
            <span class="last-price">₹${lastPrice}</span>
          </div>
          <div class="window-body">
            <div class="su-input-group">
              <label>Qty.</label>
              <input type="number" name="quantity" value="1" />
            </div>
            <div class="su-input-group">
              <label>Price</label>
              <input type="number" name="price" step="0.05"
                value="${market ? "0" : lastPrice.replace(/,/g, "")}" ${market ? "disabled" : ""} />
            </div>
            <div class="su-input-group">
              <label>Trigger price</label>
              <input type="number" name="trigger_price" value="0" disabled />
            </div>
          </div>
          <div class="window-footer">
            <span class="margin-info">Margin required ₹1,407.95</span>
            <span class="actions">
              <button type="submit" class="submit">${side === "buy" ? "Buy" : "Sell"}</button>
              <button type="button" class="cancel">Cancel</button>
            </span>
          </div>`;
        win.addEventListener("submit", (e) => e.preventDefault());
        win.querySelector(".cancel").addEventListener("click", () => win.remove());
        document.body.appendChild(win);
      }

      document.querySelectorAll("[data-fixture]").forEach((btn) => {
        btn.addEventListener("click", () =>
          openOrderWindow(btn.closest(".instrument"), btn.dataset.fixture)
        );
      });
    </script>
  </body>
</html>
