name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the trader workflow or pain point behind the request.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like TradeMarkk to do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "Journal / trade logging"
        - "Charges / tax"
        - "Analytics / insights"
        - "Community"
        - "Backtesting"
        - "Chrome extension / broker capture"
        - "Self-hosting / deployment"
        - "Other"
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
